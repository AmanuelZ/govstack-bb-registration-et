# Default values for registration-bb-et

replicaCount: 2

image:
  repository: ghcr.io/amanuelzw/govstack-bb-registration-et
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to Chart.appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/api/v1/health"

podLabels:
  govstack.global/bb: registration
  govstack.global/country: ET

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: registration.govstack.et
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: registration-bb-et-tls
      hosts:
        - registration.govstack.et

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/v1/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

volumes:
  - name: uploads
    emptyDir: {}
  - name: tmp
    emptyDir: {}

volumeMounts:
  - name: uploads
    mountPath: /app/uploads
  - name: tmp
    mountPath: /tmp

nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - registration-bb-et
          topologyKey: kubernetes.io/hostname

env:
  NODE_ENV: production
  PORT: "3000"
  HOST: "0.0.0.0"
  LOG_LEVEL: info
  API_VERSION: v1
  MAX_FILE_SIZE_MB: "10"
  IM_VALIDATE_CLIENTS: "true"
  MOCK_FAYDA_ENABLED: "false"
  SEED_TEST_DATA: "false"

# Reference existing secrets — do not store values here
envFrom:
  - secretRef:
      name: registration-bb-et-secrets

# PostgreSQL subchart (bitnami)
postgresql:
  enabled: true
  auth:
    username: govstack
    database: govstack_registration
    existingSecret: registration-bb-et-secrets
    secretKeys:
      adminPasswordKey: POSTGRES_PASSWORD
      userPasswordKey: POSTGRES_PASSWORD
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

# Redis subchart (bitnami)
redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 2Gi
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi

# External database (when postgresql.enabled=false)
externalDatabase:
  host: ""
  port: 5432
  database: govstack_registration
  existingSecret: ""
  existingSecretKey: DATABASE_URL

# External redis (when redis.enabled=false)
externalRedis:
  host: ""
  port: 6379
  existingSecret: ""
  existingSecretKey: REDIS_URL

# Migration job (runs prisma migrate deploy before app starts)
migrations:
  enabled: true
  image:
    repository: ghcr.io/amanuelzw/govstack-bb-registration-et
    tag: ""  # Defaults to Chart.appVersion
